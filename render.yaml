services:
  - type: web
    name: mechanic-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://mechanic-backend-cdy5.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
