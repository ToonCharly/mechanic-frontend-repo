services:
  - type: web
    name: mechanic-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://tu-backend-url.onrender.com/api/v1 # TODO: Cambia esto por la URL real de tu backend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
